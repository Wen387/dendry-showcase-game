name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build game
        run: |
          npm install
          npx dendrynexus make-html --force

      - name: Package source
        run: |
          tar -czf showcase-game-source.tar.gz \
            source/ package.json LICENSE README.md \
            out/html/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: showcase-game-source.tar.gz
